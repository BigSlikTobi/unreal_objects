server {
    listen __PORT__;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Re-resolve DNS on each request (Railway IPs change on redeploy).
    # __DNS_RESOLVER__ is replaced at container start from /etc/resolv.conf.
    resolver __DNS_RESOLVER__ valid=10s ipv6=off;
    resolver_timeout 5s;

    location /api/rule-engine/ {
        set $rule_engine_backend "__RULE_ENGINE_UPSTREAM__";
        rewrite ^/api/(.*) /$1 break;
        proxy_pass $rule_engine_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Internal-Key "__INTERNAL_API_KEY__";
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    location /api/decision-center/ {
        set $decision_center_backend "__DECISION_CENTER_UPSTREAM__";
        rewrite ^/api/(.*) /$1 break;
        proxy_pass $decision_center_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Internal-Key "__INTERNAL_API_KEY__";
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
